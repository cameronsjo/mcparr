name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src/

      - name: Ruff format
        run: uv run ruff format --check src/

      - name: Pyright
        run: uv run pyright src/
